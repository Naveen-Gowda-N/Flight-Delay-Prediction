<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flight Delay Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    color:white;
    overflow:hidden;
}

/* Background Slider */

.slider{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-2;
}

.slider img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    animation:slide 20s infinite;
}

.slider img:nth-child(1){animation-delay:0s;}
.slider img:nth-child(2){animation-delay:5s;}
.slider img:nth-child(3){animation-delay:10s;}
.slider img:nth-child(4){animation-delay:15s;}

@keyframes slide{
    0%,100%{opacity:0;}
    10%,25%{opacity:1;}
    35%{opacity:0;}
}

/* Dark Overlay */

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* Navbar */

nav{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    position:absolute;
    top:0;
    left:0;
}

.logo{
    font-size:1.5rem;
    font-weight:700;
}

.logo span{
    color:#ffd369;
}

nav ul{
    display:flex;
    gap:25px;
    list-style:none;
}

nav a{
    text-decoration:none;
    color:white;
    transition:.3s;
}

nav a:hover{
    color:#ffd369;
}

/* Hero Section */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.content{
    max-width:800px;
}

.content p{
    letter-spacing:2px;
    margin-bottom:15px;
    color:#ddd;
    font-size:clamp(.9rem,2vw,1.1rem);
}

.content h1{
    font-size:clamp(2.5rem,7vw,5rem);
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    background:#ffd369;
    color:black;
    text-decoration:none;
    border-radius:50px;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
    background:white;
}

/* Mobile */

@media(max-width:768px){

    nav{
        flex-direction:column;
        gap:15px;
    }

    nav ul{
        flex-wrap:wrap;
        justify-content:center;
        gap:15px;
    }

}

</style>

</head>

<body>

<!-- Background Images -->

<div class="slider">

    <img src="../static/images/flight.jpg">
    <img src="../static/images/image.jpg">
    <img src="../static/images/image33.jpg">
    <img src="../static/images/image2.jpg">

</div>

<div class="overlay"></div>

<!-- Navbar -->

<nav>

    <div class="logo">
        Flight <span>Delay</span>
    </div>

    <ul>
        <li><a href="{{ url_for('login') }}">Login</a></li>
        <li><a href="{{ url_for('abstract') }}">Abstract</a></li>
        <li><a href="{{ url_for('future') }}">Future</a></li>
        <li><a href="{{ url_for('home') }}">Prediction</a></li>
    </ul>

</nav>

<!-- Hero -->

<section class="hero">

    <div class="content">

        <p>AVIATION BIG DATA & MACHINE LEARNING</p>

        <h1>Flight Delay Prediction</h1>

        <a href="{{ url_for('home') }}" class="btn">
            Start Prediction
        </a>

    </div>

</section>

</body>
</html>
