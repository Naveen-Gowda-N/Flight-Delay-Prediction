<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Performance Analysis</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f4f7fb;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:1000px;
        background:white;
        padding:25px;
        border-radius:20px;
        box-shadow:0 5px 20px rgba(0,0,0,0.1);
        text-align:center;
    }

    h1{
        margin-bottom:20px;
        color:#222;
        font-size:clamp(24px,4vw,38px);
    }

    #chart{
        width:100%;
        height:500px;
    }

    .btn{
        margin-top:20px;
        padding:12px 30px;
        border:none;
        border-radius:10px;
        background:#16a34a;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .btn:hover{
        background:#15803d;
        transform:scale(1.05);
    }

    @media(max-width:768px){
        #chart{
            height:350px;
        }

        .container{
            padding:15px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <h1>Performance Analysis</h1>

    <div id="chart"></div>

    <a href="{{url_for('future')}}">
        <button class="btn">FUTURE</button>
    </a>

</div>

<script>

google.charts.load('current', {'packages':['bar']});
google.charts.setOnLoadCallback(drawChart);

function drawChart() {

    const data = google.visualization.arrayToDataTable([
        ['Model', 'Existing', 'Proposed'],
        ['Random Forest', 92.2, 90.2],
        ['XG Booster', 93, 90],
        ['Decision Tree', 92, 90],
        ['Naive Bayes', 92, 92]
    ]);

    const options = {
        chartArea:{width:'70%', height:'70%'},
        bars:'horizontal',
        legend:{position:'top'},
        colors:['#2563eb','#16a34a'],
        backgroundColor:'transparent'
    };

    const chart = new google.charts.Bar(document.getElementById('chart'));
    chart.draw(data, google.charts.Bar.convertOptions(options));
}

window.addEventListener('resize', drawChart);

</script>

</body>
</html>
