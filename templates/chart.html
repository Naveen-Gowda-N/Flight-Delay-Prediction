<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flight Delay Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
    linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
    url("https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop");

    background-size:cover;
    background-position:center;
}

.container{
    width:100%;
    max-width:850px;
    padding:35px;
    border-radius:25px;

    background:rgba(255,255,255,.1);
    backdrop-filter:blur(10px);

    text-align:center;
    color:white;

    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    font-size:clamp(2rem,5vw,3rem);
    margin-bottom:20px;
}

.result{
    font-size:1.2rem;
    margin-bottom:20px;
}

.delay{
    color:#ff7675;
}

.ontime{
    color:#55efc4;
}

#chart{
    width:100%;
    height:400px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:14px 30px;

    border-radius:50px;

    background:#00bcd4;
    color:white;

    text-decoration:none;

    transition:.3s;
}

.btn:hover{
    background:#0097a7;
    transform:translateY(-3px);
}

@media(max-width:600px){

    .container{
        padding:20px;
    }

    #chart{
        height:280px;
    }
}

</style>

</head>

<body>

<div class="container">

    <h1>Flight Delay Prediction</h1>

    <div class="result">

        <span id="status"></span>

    </div>

    <div id="chart"></div>

    <a href="{{ url_for('existing') }}" class="btn">
        Performance Analysis
    </a>

</div>

<script>

google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(drawChart);

function drawChart(){

    var prediction = "{{ prediction }}";

    var delay = 20;
    var noDelay = 80;

    if(prediction == "1.0" || prediction == "Flight Will Be Delayed"){

        delay = 85;
        noDelay = 15;

        document.getElementById("status").innerHTML =
        'Flight Status : <b class="delay">Delayed ✈</b>';

    }

    else{

        document.getElementById("status").innerHTML =
        'Flight Status : <b class="ontime">On Time ✓</b>';
    }

    var data = google.visualization.arrayToDataTable([
        ['Status', 'Value'],
        ['Delay', delay],
        ['No Delay', noDelay]
    ]);

    var options = {

        backgroundColor:'transparent',

        pieHole:0.55,

        chartArea:{
            width:'90%',
            height:'80%'
        },

        legend:{
            position:'bottom',
            textStyle:{
                color:'white',
                fontSize:14
            }
        }
    };

    var chart = new google.visualization.PieChart(
        document.getElementById('chart')
    );

    chart.draw(data, options);
}

window.addEventListener('resize', drawChart);

</script>

</body>

</html>
